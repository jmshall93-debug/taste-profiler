<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taste Profiler — Mapping Your Affinities</title>
  <style>
    :root {
      --bg-deep:    #070706;
      --bg:         #0c0b0a;
      --bg-2:       #131210;
      --bg-3:       #1b1916;
      --border:     #2c2925;
      --border-strong: #40382f;
      --text:       #e8e4dc;
      --text-muted: #9a948a;
      --text-faint: #5c5650;
      --accent:     #b8925a;
      --accent-dim: #7a6340;
      --font-display: Charter, 'Bitstream Charter', Cambria, Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --measure: 42rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ──────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-deep);
    }

    /* Header */
    #app-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 54px;
      padding: 0 1.8rem;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #app-header::after {
      content: '';
      position: absolute;
      left: 1.8rem;
      bottom: -1px;
      width: 4.5rem;
      border-bottom: 1px solid var(--accent-dim);
    }

    #app-header h1 {
      min-width: 0;
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: normal;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    #app-header .header-right {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    #mode-badge {
      font-family: var(--font-body);
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-faint);
      border: 1px solid var(--border);
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    #mode-badge.reading {
      color: var(--accent);
      border-color: var(--accent-dim);
    }

    #clear-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      font-family: var(--font-body);
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.2rem 0;
      transition: color 0.15s;
    }

    #clear-btn:hover { color: var(--text-muted); }

    #clear-btn:focus-visible,
    #send-btn:focus-visible {
      outline: 1px solid var(--accent-dim);
      outline-offset: 2px;
    }

    /* Body */
    #app-body {
      display: flex;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── Chat ───────────────────────────────────── */
    #chat-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }

    #messages {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: clamp(2.4rem, 5vh, 4rem) clamp(1.5rem, 5vw, 4.5rem) 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      position: relative;
      display: flex;
      flex-direction: column;
      max-width: var(--measure);
      width: 100%;
    }

    .msg + .msg { margin-top: 2.8rem; }

    .msg.user {
      align-self: center;
      align-items: flex-end;
      max-width: 32rem;
      margin-left: clamp(2rem, 10vw, 8rem);
    }

    .msg.user + .msg.assistant { margin-top: 1.05rem; }
    .msg.assistant { align-self: center; }

    .msg.assistant::before {
      content: '';
      width: 1.9rem;
      margin-bottom: 0.8rem;
      border-top: 1px solid var(--accent-dim);
      opacity: 0.8;
    }

    .msg-label {
      font-family: var(--font-body);
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.4rem;
    }

    .msg.assistant .msg-label { display: none; }

    .msg-body {
      line-height: 1.75;
      font-size: 1rem;
      overflow-wrap: anywhere;
    }

    .msg.user .msg-body {
      font-family: var(--font-body);
      color: var(--text-muted);
      text-align: right;
      font-style: italic;
      font-size: 0.96rem;
      line-height: 1.65;
      padding-right: 0.9rem;
      border-right: 1px solid var(--border-strong);
    }

    .msg.assistant .msg-body {
      font-family: var(--font-body);
      color: var(--text);
      font-size: 1.03rem;
    }

    /* Markdown within assistant messages */
    .msg-body p { margin-bottom: 1.1em; }
    .msg-body p:last-child { margin-bottom: 0; }

    .msg-body strong {
      color: var(--text);
      font-weight: 500;
    }

    .msg-body em {
      font-style: italic;
      color: var(--text);
    }

    .msg-body h1 {
      font-family: var(--font-display);
      font-weight: normal;
      font-size: 1.15rem;
      color: var(--accent);
      letter-spacing: 0;
      margin: 1.6em 0 0.55em;
    }

    .msg-body h2 {
      font-family: var(--font-display);
      font-weight: normal;
      font-size: 1.08rem;
      color: var(--accent);
      letter-spacing: 0;
      margin: 2em 0 0.75em;
      padding-top: 0;
    }

    .msg-body h2:first-child { margin-top: 0; }

    .msg-body h3 {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.88rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      margin: 1.4em 0 0.5em;
    }

    .msg-body ul, .msg-body ol {
      padding-left: 1.35em;
      margin-bottom: 1.15em;
    }

    .msg-body li {
      margin-bottom: 0.5em;
      padding-left: 0.1em;
    }

    .msg-body li:last-child { margin-bottom: 0; }

    /* Recommendation entries: title / category / explanation */
    .msg-body ol > li {
      margin-bottom: 2rem;
      line-height: 1.72;
      padding-bottom: 0.15rem;
    }

    .msg-body ol > li > strong:first-child {
      display: block;
      font-family: var(--font-display);
      color: var(--text);
      font-weight: normal;
      font-size: 1.05rem;
      margin-bottom: 0.35em;
      letter-spacing: 0;
    }

    .msg-body ol > li > em,
    .msg-body ol > li > p > em:only-child {
      display: block;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-style: normal;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: none;
      color: var(--text-muted);
      margin-bottom: 0.65em;
    }

    .msg-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75em 0;
    }

    .msg-body blockquote {
      border-left: 1px solid var(--border);
      padding-left: 1em;
      color: var(--text-muted);
      margin: 0.75em 0;
    }

    .msg-body code {
      font-family: monospace;
      font-size: 0.85em;
      color: var(--text-muted);
      background: var(--bg-3);
      padding: 0.1em 0.3em;
      border-radius: 2px;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 0.3rem 0;
      align-items: center;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-dim);
      animation: blink 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.25; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* Input */
    #input-area {
      width: calc(100% - 3rem);
      max-width: 46rem;
      margin: 0 auto 1.25rem;
      padding: 0.55rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      display: flex;
      gap: 0.55rem;
      align-items: flex-end;
      flex-shrink: 0;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
    }

    #user-input {
      flex: 1;
      min-width: 0;
      background: var(--bg-3);
      border: 1px solid transparent;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.94rem;
      line-height: 1.65;
      padding: 0.62rem 0.85rem;
      border-radius: 2px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 150px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #user-input:focus,
    #user-input:focus-visible {
      border-color: var(--accent-dim);
      outline: none;
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    #user-input::placeholder {
      color: var(--text-faint);
      font-style: italic;
    }

    #user-input:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #send-btn {
      background: var(--bg-deep);
      border: 1px solid var(--border-strong);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.8rem;
      letter-spacing: 0.03em;
      padding: 0 1.1rem;
      height: 42px;
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Sidebar ────────────────────────────────── */
    #sidebar {
      width: 332px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-deep);
    }

    .sidebar-head {
      position: relative;
      padding: 1.25rem 1.35rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-size: 0.92rem;
      font-weight: normal;
      letter-spacing: 0.01em;
      color: var(--text-muted);
    }

    .sidebar-head::after {
      content: '';
      position: absolute;
      left: 1.35rem;
      bottom: -1px;
      width: 2.4rem;
      border-bottom: 1px solid var(--accent-dim);
    }

    #notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.65rem 1.35rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #notes-list::-webkit-scrollbar { width: 3px; }
    #notes-list::-webkit-scrollbar-thumb { background: var(--border); }

    #notes-list .empty-state {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.8rem;
      color: var(--text-faint);
      line-height: 1.65;
      padding: 0.75rem 0;
    }

    .map-section {
      margin-top: 1.1rem;
    }

    .map-section:first-child { margin-top: 0.35rem; }

    .map-section-label {
      font-family: var(--font-body);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.55rem;
    }

    .theme-entry,
    .work-entry,
    .link-entry {
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.2s ease;
    }

    .theme-entry:last-child,
    .work-entry:last-child,
    .link-entry:last-child { border-bottom: none; }

    .theme-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .theme-label {
      font-family: var(--font-display);
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.4;
    }

    .theme-confidence {
      flex-shrink: 0;
      font-family: var(--font-body);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .theme-confidence.solid { color: var(--text-muted); opacity: 0.9; }
    .theme-confidence.strong { color: var(--accent-dim); }

    .theme-evidence {
      margin-top: 0.3rem;
      font-family: var(--font-body);
      font-size: 0.72rem;
      color: var(--text-faint);
      line-height: 1.5;
    }

    .work-title {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .work-themes {
      margin-top: 0.25rem;
      font-family: var(--font-body);
      font-size: 0.68rem;
      color: var(--text-faint);
      line-height: 1.4;
    }

    .link-entry {
      font-family: var(--font-body);
      font-size: 0.74rem;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .link-pair {
      color: var(--text);
      font-size: 0.78rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .typing-dot { animation: none; opacity: 0.45; }
      .theme-entry, .work-entry, .link-entry { animation: none; }
      #messages { scroll-behavior: auto; }
      #mode-badge, #send-btn, #clear-btn, #user-input { transition: none; }
    }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 660px) {
      #sidebar { display: none; }
      #chat-pane { border-right: none; }
      #app-header {
        min-height: 50px;
        padding: 0 1rem;
      }
      #app-header::after { left: 1rem; width: 3.5rem; }
      #app-header h1 {
        max-width: calc(100vw - 5.5rem);
        overflow: hidden;
        font-size: 0.94rem;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      #mode-badge { display: none; }
      #app-header .header-right { gap: 0; }
      #messages { padding: 2rem 1.2rem 1.5rem; }
      .msg { max-width: 100%; }
      .msg + .msg { margin-top: 2.35rem; }
      .msg.user {
        max-width: 88%;
        margin-left: 1.5rem;
      }
      .msg.user + .msg.assistant { margin-top: 0.9rem; }
      .msg.assistant .msg-body { font-size: 1rem; }
      #input-area {
        width: calc(100% - 1.5rem);
        margin-bottom: 0.75rem;
      }
    }
  </style>
</head>
<body>

<!-- ── Main App ───────────────────────────────────── -->
<div id="app">
  <div id="app-header">
    <h1>Taste Profiler — Mapping Your Affinities</h1>
    <div class="header-right">
      <span id="mode-badge">Mapping</span>
      <button id="clear-btn" title="Clear conversation">Clear</button>
    </div>
  </div>

  <div id="app-body">
    <div id="chat-pane">
      <div id="messages" aria-live="polite" aria-relevant="additions"></div>
      <div id="input-area">
        <textarea id="user-input" rows="1" placeholder="Share something you love…"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div id="sidebar">
      <div class="sidebar-head">Your affinity map</div>
      <div id="notes-list">
        <p class="empty-state">Affinities emerge as patterns clarify across what you share.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
'use strict';

// ── Config & state ───────────────────────────────────────────────────────────
const STORAGE_KEY  = 'taste_profiler_v2';
const OPENING_GREETING = "I am the Taste Profiler. I help you discover affinities — the deeper patterns beneath what you love — across film, music, books, places, and ideas. Recommendations come later, once those patterns are clear.\n\nBegin with something you return to, and tell me what holds you there.";

let messages  = [];
let profile   = emptyProfile();
let loading   = false;
let userPinnedToBottom = true;

const SCROLL_THRESHOLD = 96;

function emptyProfile() {
  return { themes: [], works: [], links: [] };
}

// ── DOM refs ─────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const userInputEl= document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
const modeBadge  = document.getElementById('mode-badge');
const clearBtn   = document.getElementById('clear-btn');
const notesList  = document.getElementById('notes-list');

// ── Marked config ────────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

function renderMarkdown(content) {
  const { visible } = stripAffinityMap(content);
  return marked.parse(visible);
}

function setLoadingState(isLoading) {
  loading = isLoading;
  sendBtn.disabled = isLoading;
  userInputEl.disabled = isLoading;
  userInputEl.setAttribute('aria-busy', String(isLoading));
  sendBtn.setAttribute('aria-busy', String(isLoading));
}

function updateScrollPin() {
  const distance = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight;
  userPinnedToBottom = distance <= SCROLL_THRESHOLD;
}

function scrollMessagesIfPinned(force = false) {
  if (force || userPinnedToBottom) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
    userPinnedToBottom = true;
  }
}

messagesEl.addEventListener('scroll', updateScrollPin, { passive: true });

function showOpeningGreeting() {
  messages = [{ role: 'assistant', content: OPENING_GREETING }];
  renderMessage('assistant', OPENING_GREETING);
  saveSession();
}

// ── Persistence ──────────────────────────────────────────────────────────────
function saveSession() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, profile }));
  } catch {}
}

function tryLoadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

clearBtn.addEventListener('click', () => {
  if (!confirm('Clear the conversation and start fresh?')) return;
  messages = [];
  profile  = emptyProfile();
  messagesEl.innerHTML = '';
  renderProfile();
  modeBadge.textContent = 'Mapping';
  modeBadge.classList.remove('reading');
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem('taste_profiler_v1');
  showOpeningGreeting();
});

// ── Input handling ───────────────────────────────────────────────────────────
userInputEl.addEventListener('input', () => {
  userInputEl.style.height = 'auto';
  userInputEl.style.height = Math.min(userInputEl.scrollHeight, 150) + 'px';
});

userInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!loading) submit();
  }
});

sendBtn.addEventListener('click', () => { if (!loading) submit(); });

function submit() {
  const text = userInputEl.value.trim();
  if (!text) return;
  userInputEl.value = '';
  userInputEl.style.height = 'auto';
  call(text);
}

// ── API call with streaming ───────────────────────────────────────────────────
async function call(userText) {
  if (!userText || loading) return;
  setLoadingState(true);
  userPinnedToBottom = true;

  messages.push({ role: 'user', content: userText });
  renderMessage('user', userText, true);

  const typingEl = addTyping();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    if (!resp.ok) {
      let detail = 'The assistant is temporarily unavailable. Please try again.';
      try {
        const err = await resp.json();
        if (err.error) detail = err.error;
      } catch {}
      throw new Error(detail);
    }

    typingEl.remove();

    const { wrapper, bodyEl } = buildMsgEl('assistant');
    messagesEl.appendChild(wrapper);
    scrollMessagesIfPinned(true);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let sseBuffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
        try {
          const delta = JSON.parse(line.slice(6)).choices?.[0]?.delta?.content || '';
          if (delta) {
            full += delta;
            bodyEl.innerHTML = renderMarkdown(full);
            scrollMessagesIfPinned();
          }
        } catch {}
      }
    }

    sseBuffer += decoder.decode();
    if (sseBuffer.startsWith('data: ') && sseBuffer !== 'data: [DONE]') {
      try {
        const delta = JSON.parse(sseBuffer.slice(6)).choices?.[0]?.delta?.content || '';
        if (delta) full += delta;
      } catch {}
    }

    bodyEl.innerHTML = renderMarkdown(full);
    scrollMessagesIfPinned();

    messages.push({ role: 'assistant', content: full });
    ingestAssistantContent(full);
    detectMode(full);
    saveSession();

  } catch (err) {
    if (typingEl.isConnected) typingEl.remove();
    renderError(err.message);
  }

  setLoadingState(false);
  userInputEl.focus();
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function buildMsgEl(role) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Guide';

  const bodyEl = document.createElement('div');
  bodyEl.className = 'msg-body';

  wrapper.appendChild(label);
  wrapper.appendChild(bodyEl);
  return { wrapper, bodyEl };
}

function renderMessage(role, content, scroll = true) {
  const { wrapper, bodyEl } = buildMsgEl(role);
  if (role === 'assistant') {
    bodyEl.innerHTML = renderMarkdown(content);
  } else {
    bodyEl.textContent = content;
  }
  messagesEl.appendChild(wrapper);
  if (scroll) scrollMessagesIfPinned(true);
}

function addTyping() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  wrapper.id = '__typing__';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Guide';

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  wrapper.appendChild(label);
  wrapper.appendChild(dots);
  messagesEl.appendChild(wrapper);
  scrollMessagesIfPinned(true);
  return wrapper;
}

function renderError(msg) {
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = `<div class="msg-label">System</div><div class="msg-body" style="color:#9b4a4a;font-size:0.88rem;">${escHtml(msg)}</div>`;
  messagesEl.appendChild(el);
  scrollMessagesIfPinned(true);
}

// ── Affinity map: parse machine block + living sidebar ───────────────────────
const AFFINITY_MAP_RE = /<!--\s*affinity-map\s*([\s\S]*?)-->/i;
const AFFINITY_MAP_OPEN_RE = /<!--\s*affinity-map/i;

const EXCLUDED_LABELS = new Set([
  'soul reading',
  'affinity reading',
  'suggestions for exploration',
  'suggestions',
  'first bearings',
  'insight',
  'underlying threads',
  'collection mode',
  'reading & discovery mode',
  'reading and discovery mode',
]);

function stripAffinityMap(text) {
  if (!text || typeof text !== 'string') return { visible: '', patch: null };

  let visible = text;
  let patch = null;
  const match = text.match(AFFINITY_MAP_RE);

  if (match) {
    visible = text.replace(AFFINITY_MAP_RE, '').replace(/\n{3,}/g, '\n\n').trimEnd();
    try {
      patch = JSON.parse(match[1].trim());
    } catch {}
  } else {
    const incomplete = text.search(AFFINITY_MAP_OPEN_RE);
    if (incomplete !== -1) {
      visible = text.slice(0, incomplete).trimEnd();
    }
  }

  return { visible, patch };
}

function normalizeMapTitle(raw) {
  let title = String(raw || '').trim()
    .replace(/\*\*/g, '')
    .replace(/"/g, '')
    .replace(/\s*\([^)]*\)\s*$/i, '')
    .replace(/[:;.,!?]+$/g, '')
    .replace(/\s+/g, ' ')
    .trim();

  const directed = title.match(/^(.+?)\s+directed by\s+(.+)$/i);
  if (directed) title = directed[1].trim();

  return title;
}

function isExcludedLabel(title) {
  const key = title.toLowerCase().replace(/[:;.,!?]+$/g, '').trim();
  return !key || key.length < 3 || EXCLUDED_LABELS.has(key);
}

function parseFallbackWorks(text) {
  if (!text || typeof text !== 'string') return [];

  const items = [];
  const lines = text.split('\n');

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;

    const numbered = trimmed.match(
      /^\d+\.\s+(?:\*\*(.+?)\*\*|"(.+?)"(?:\s+by\s+[^"]+)?|([^:(]+?))(?:\s*\([^)]+\))?(?:\s*[:—-]\s*|\s+|$)/
    );
    if (numbered) {
      const raw = numbered[1] || numbered[2] || numbered[3];
      const title = normalizeMapTitle(raw);
      if (!isExcludedLabel(title)) items.push(title);
      continue;
    }

    const numberedTitle = trimmed.match(/^\d+\.\s+\*\*(.+?)\*\*\s*$/);
    if (numberedTitle) {
      const title = normalizeMapTitle(numberedTitle[1]);
      if (!isExcludedLabel(title)) items.push(title);
    }
  }

  return items;
}

function themeLabelById(id) {
  const theme = profile.themes.find(t => t.id === id);
  return theme ? theme.label : id;
}

function mergeProfile(patch) {
  if (!patch || typeof patch !== 'object') return false;
  let changed = false;

  if (Array.isArray(patch.themes)) {
    for (const theme of patch.themes) {
      if (!theme || !theme.id || !theme.label) continue;
      const confidence = ['emerging', 'solid', 'strong'].includes(theme.confidence)
        ? theme.confidence
        : 'emerging';
      const evidence = Array.isArray(theme.evidence)
        ? theme.evidence.map(e => String(e).trim()).filter(Boolean).slice(0, 3)
        : [];
      const idx = profile.themes.findIndex(t => t.id === theme.id);
      const next = {
        id: String(theme.id),
        label: String(theme.label).trim(),
        confidence,
        evidence,
      };
      if (idx === -1) {
        profile.themes.push(next);
        changed = true;
      } else {
        const prev = profile.themes[idx];
        if (
          prev.label !== next.label
          || prev.confidence !== next.confidence
          || JSON.stringify(prev.evidence) !== JSON.stringify(next.evidence)
        ) {
          profile.themes[idx] = next;
          changed = true;
        }
      }
    }
  }

  if (Array.isArray(patch.works)) {
    for (const work of patch.works) {
      if (!work || !work.title) continue;
      const title = normalizeMapTitle(work.title);
      if (isExcludedLabel(title)) continue;
      const themes = Array.isArray(work.themes)
        ? [...new Set(work.themes.map(t => String(t)))]
        : [];
      const idx = profile.works.findIndex(w => w.title.toLowerCase() === title.toLowerCase());
      if (idx === -1) {
        profile.works.push({ title, themes });
        changed = true;
      } else {
        const merged = [...new Set([...(profile.works[idx].themes || []), ...themes])];
        if (JSON.stringify(profile.works[idx].themes) !== JSON.stringify(merged)) {
          profile.works[idx].themes = merged;
          changed = true;
        }
      }
    }
  }

  if (Array.isArray(patch.links)) {
    for (const link of patch.links) {
      if (!link || !link.from || !link.to) continue;
      const from = String(link.from);
      const to = String(link.to);
      const note = link.note ? String(link.note).trim() : '';
      const idx = profile.links.findIndex(l => l.from === from && l.to === to);
      if (idx === -1) {
        profile.links.push({ from, to, note });
        changed = true;
      } else if (note && profile.links[idx].note !== note) {
        profile.links[idx].note = note;
        changed = true;
      }
    }
  }

  return changed;
}

function seedWorksFromFallback(text) {
  const titles = parseFallbackWorks(text);
  if (titles.length === 0) return false;
  return mergeProfile({
    works: titles.map(title => ({ title, themes: [] })),
  });
}

function ingestAssistantContent(text) {
  const { patch } = stripAffinityMap(text);
  let changed = false;
  if (patch) changed = mergeProfile(patch) || changed;
  if (!patch || !Array.isArray(patch.works) || patch.works.length === 0) {
    if (text.includes('## First Bearings') || text.includes('## Suggestions for Exploration')) {
      changed = seedWorksFromFallback(text) || changed;
    }
  }
  if (changed) renderProfile();
}

function renderProfile() {
  const hasThemes = profile.themes.length > 0;
  const hasWorks = profile.works.length > 0;
  const hasLinks = profile.links.length > 0;

  if (!hasThemes && !hasWorks && !hasLinks) {
    notesList.innerHTML = '<p class="empty-state">Affinities emerge as patterns clarify across what you share.</p>';
    return;
  }

  const confidenceRank = { emerging: 0, solid: 1, strong: 2 };
  const themes = [...profile.themes].sort(
    (a, b) => (confidenceRank[b.confidence] || 0) - (confidenceRank[a.confidence] || 0)
  );
  const works = profile.works.slice(-40);
  const links = profile.links.slice(-20);

  let html = '';

  if (hasThemes) {
    html += `<div class="map-section"><div class="map-section-label">Affinities</div>`;
    html += themes.map(theme => {
      const evidence = theme.evidence && theme.evidence[0]
        ? `<div class="theme-evidence">${escHtml(theme.evidence[0])}</div>`
        : '';
      return `<div class="theme-entry">
        <div class="theme-head">
          <div class="theme-label">${escHtml(theme.label)}</div>
          <div class="theme-confidence ${escHtml(theme.confidence)}">${escHtml(theme.confidence)}</div>
        </div>
        ${evidence}
      </div>`;
    }).join('');
    html += `</div>`;
  }

  if (hasWorks) {
    html += `<div class="map-section"><div class="map-section-label">Works</div>`;
    html += works.map(work => {
      const tags = (work.themes || [])
        .map(id => themeLabelById(id))
        .filter(Boolean)
        .join(' · ');
      const tagLine = tags
        ? `<div class="work-themes">${escHtml(tags)}</div>`
        : '';
      return `<div class="work-entry">
        <div class="work-title">${escHtml(work.title)}</div>
        ${tagLine}
      </div>`;
    }).join('');
    html += `</div>`;
  }

  if (hasLinks) {
    html += `<div class="map-section"><div class="map-section-label">Connections</div>`;
    html += links.map(link => {
      const from = themeLabelById(link.from);
      const to = themeLabelById(link.to);
      const note = link.note ? ` — ${escHtml(link.note)}` : '';
      return `<div class="link-entry"><span class="link-pair">${escHtml(from)} ↔ ${escHtml(to)}</span>${note}</div>`;
    }).join('');
    html += `</div>`;
  }

  notesList.innerHTML = html;
}

function rebuildProfileFromMessages() {
  profile = emptyProfile();
  for (const message of messages) {
    if (!message || message.role !== 'assistant' || !message.content) continue;
    ingestAssistantContent(message.content);
  }
  renderProfile();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Mode detection ────────────────────────────────────────────────────────────
function detectMode(text = '') {
  const t = (text || '').toLowerCase();
  if (
    t.includes('affinity reading')
    || t.includes('soul reading')
    || t.includes('suggestions for exploration')
    || t.includes('first bearings')
  ) {
    modeBadge.textContent = 'Reading';
    modeBadge.classList.add('reading');
  } else if (t.includes('## insight')) {
    modeBadge.textContent = 'Insight';
    modeBadge.classList.remove('reading');
  } else {
    modeBadge.textContent = 'Mapping';
    modeBadge.classList.remove('reading');
  }
}

// ── Startup ──────────────────────────────────────────────────────────────────
(function init() {
  try {
    const saved = tryLoadSession();
    if (saved && Array.isArray(saved.messages) && saved.messages.length > 0) {
      messages = saved.messages;
      profile = emptyProfile();
      if (saved.profile && typeof saved.profile === 'object') {
        mergeProfile(saved.profile);
      }
      saved.messages.forEach(m => {
        if (m && m.role !== 'system' && m.content) renderMessage(m.role, m.content, false);
      });
      rebuildProfileFromMessages();
      const lastAssistant = [...messages].reverse().find(m => m && m.role === 'assistant');
      detectMode(lastAssistant?.content || '');
    } else {
      showOpeningGreeting();
      renderProfile();
    }
  } catch {
    messages = [];
    profile = emptyProfile();
    messagesEl.innerHTML = '';
    showOpeningGreeting();
    renderProfile();
  }

  userInputEl.focus();
})();
</script>
