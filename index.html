<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taste Profiler — Soul Harmony Guide</title>
  <style>
    :root {
      --bg:        #0c0b09;
      --bg-2:      #131210;
      --bg-3:      #1c1a16;
      --border:    #272420;
      --text:      #d6c8ae;
      --text-dim:  #7a6e5f;
      --text-faint:#3a342c;
      --accent:    #c49a52;
      --accent-dim:#7a5e30;
      --serif:     'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
      --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ──────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    #app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.4rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #app-header h1 {
      font-family: var(--serif);
      font-size: 0.95rem;
      font-weight: normal;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    #app-header .header-right {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    #mode-badge {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      transition: color 0.3s, border-color 0.3s;
    }

    #mode-badge.reading {
      color: var(--accent);
      border-color: var(--accent-dim);
    }

    #clear-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.2rem 0;
      transition: color 0.15s;
    }

    #clear-btn:hover { color: var(--text-dim); }

    #clear-btn:focus-visible,
    #send-btn:focus-visible {
      outline: 1px solid var(--accent-dim);
      outline-offset: 2px;
    }

    /* Body */
    #app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Chat ───────────────────────────────────── */
    #chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 2.2rem 2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 2.4rem;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; max-width: 680px; width: 100%; }
    .msg.user { align-self: flex-end; align-items: flex-end; max-width: 520px; }
    .msg.assistant { align-self: flex-start; }

    .msg-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.5rem;
    }

    .msg-body {
      line-height: 1.82;
      font-size: 1.05rem;
    }

    .msg.user .msg-body {
      color: var(--text-dim);
      text-align: right;
      font-style: italic;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .msg.assistant .msg-body {
      font-family: var(--serif);
      color: var(--text);
    }

    /* Markdown within assistant messages */
    .msg-body p { margin-bottom: 1em; }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body strong { color: var(--accent); font-weight: normal; }
    .msg-body em { font-style: italic; color: var(--text); }

    .msg-body h1 {
      font-family: var(--serif);
      font-weight: normal;
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: 0.03em;
      margin: 1.8em 0 0.6em;
    }

    .msg-body h2 {
      font-family: var(--serif);
      font-weight: normal;
      font-size: 1.12rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      margin: 1.75em 0 0.7em;
      padding-top: 0.25em;
    }

    .msg-body h2:first-child { margin-top: 0; padding-top: 0; }

    .msg-body h3 {
      font-family: var(--serif);
      font-weight: normal;
      font-size: 0.98rem;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      margin: 1.35em 0 0.55em;
    }

    .msg-body ul, .msg-body ol {
      padding-left: 1.45em;
      margin-bottom: 1.1em;
    }

    .msg-body li {
      margin-bottom: 0.55em;
      padding-left: 0.15em;
    }

    .msg-body li:last-child { margin-bottom: 0; }

    /* Recommendation entries: title / category / explanation */
    .msg-body ol > li {
      margin-bottom: 1.65em;
      line-height: 1.78;
    }

    .msg-body ol > li > strong:first-child {
      display: block;
      color: var(--accent);
      font-size: 1.03em;
      margin-bottom: 0.3em;
      letter-spacing: 0.02em;
    }

    .msg-body ol > li > em,
    .msg-body ol > li > p > em:only-child {
      display: block;
      font-family: var(--sans);
      font-size: 0.72rem;
      font-style: normal;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      color: var(--text-dim);
      margin-bottom: 0.55em;
    }

    .msg-body hr { border: none; border-top: 1px solid var(--border); margin: 1.6em 0; }
    .msg-body blockquote {
      border-left: 2px solid var(--accent-dim);
      padding-left: 1em;
      color: var(--text-dim);
      margin: 0.5em 0;
    }
    .msg-body code {
      font-family: monospace;
      font-size: 0.85em;
      color: var(--text-dim);
      background: var(--bg-3);
      padding: 0.1em 0.3em;
      border-radius: 2px;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 0.3rem 0;
      align-items: center;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-dim);
      animation: blink 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.25; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* Input */
    #input-area {
      padding: 1rem 1.4rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.7rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--serif);
      font-size: 0.92rem;
      line-height: 1.7;
      padding: 0.6rem 0.9rem;
      border-radius: 2px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 150px;
      transition: border-color 0.15s;
    }

    #user-input:focus,
    #user-input:focus-visible {
      border-color: var(--accent-dim);
      outline: none;
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    #user-input::placeholder {
      color: var(--text-dim);
      font-style: italic;
    }

    #user-input:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #send-btn {
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--serif);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      padding: 0 1.1rem;
      height: 42px;
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-dim); color: var(--bg); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Sidebar ────────────────────────────────── */
    #sidebar {
      width: 288px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .sidebar-head {
      padding: 0.85rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--serif);
      font-size: 0.78rem;
      font-weight: normal;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    #notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    #notes-list::-webkit-scrollbar { width: 3px; }
    #notes-list::-webkit-scrollbar-thumb { background: var(--border); }

    #notes-list .empty-state {
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.82rem;
      color: var(--text-faint);
      line-height: 1.7;
      padding: 0.2rem 0.1rem;
    }

    .note-entry {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.6rem 0.65rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 2px;
      animation: fadeIn 0.25s ease;
    }

    .note-index {
      flex-shrink: 0;
      width: 1.35rem;
      font-family: var(--sans);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--accent-dim);
      padding-top: 0.2rem;
      text-align: center;
    }

    .note-title {
      font-family: var(--serif);
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .typing-dot { animation: none; opacity: 0.45; }
      .note-entry { animation: none; }
      #messages { scroll-behavior: auto; }
      #mode-badge, #send-btn, #clear-btn, #user-input { transition: none; }
    }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 660px) {
      #sidebar { display: none; }
      #chat-pane { border-right: none; }
      #messages { padding: 1.6rem 1.2rem 1rem; gap: 2rem; }
      .msg { max-width: 100%; }
      .msg.user { max-width: 88%; }
    }
  </style>
</head>
<body>

<!-- ── Main App ───────────────────────────────────── -->
<div id="app">
  <div id="app-header">
    <h1>Taste Profiler — Soul Harmony Guide</h1>
    <div class="header-right">
      <span id="mode-badge">Collection</span>
      <button id="clear-btn" title="Clear conversation">Clear</button>
    </div>
  </div>

  <div id="app-body">
    <div id="chat-pane">
      <div id="messages" aria-live="polite" aria-relevant="additions"></div>
      <div id="input-area">
        <textarea id="user-input" rows="1" placeholder="Share something you love…"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div id="sidebar">
      <div class="sidebar-head">Your taste map</div>
      <div id="notes-list">
        <p class="empty-state">Your map will take shape as the conversation unfolds.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
'use strict';

// ── Config & state ───────────────────────────────────────────────────────────
const STORAGE_KEY  = 'taste_profiler_v1';
const OPENING_GREETING = "Hello there! I'm the Taste Profiler — a soul companion for mapping the territory of your taste. Tell me something you love, and we'll begin to draw the map. What's been on your mind lately — a film, a record, a place, an idea?";

let messages  = [];
let named     = [];
let loading   = false;
let userPinnedToBottom = true;

const SCROLL_THRESHOLD = 96;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const userInputEl= document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
const modeBadge  = document.getElementById('mode-badge');
const clearBtn   = document.getElementById('clear-btn');
const notesList  = document.getElementById('notes-list');

// ── Marked config ────────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

function renderMarkdown(content) {
  return marked.parse(content);
}

function setLoadingState(isLoading) {
  loading = isLoading;
  sendBtn.disabled = isLoading;
  userInputEl.disabled = isLoading;
  userInputEl.setAttribute('aria-busy', String(isLoading));
  sendBtn.setAttribute('aria-busy', String(isLoading));
}

function updateScrollPin() {
  const distance = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight;
  userPinnedToBottom = distance <= SCROLL_THRESHOLD;
}

function scrollMessagesIfPinned(force = false) {
  if (force || userPinnedToBottom) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
    userPinnedToBottom = true;
  }
}

messagesEl.addEventListener('scroll', updateScrollPin, { passive: true });

function showOpeningGreeting() {
  messages = [{ role: 'assistant', content: OPENING_GREETING }];
  renderMessage('assistant', OPENING_GREETING);
  saveSession();
}

// ── Persistence ──────────────────────────────────────────────────────────────
function saveSession() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, named }));
  } catch {}
}

function tryLoadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

clearBtn.addEventListener('click', () => {
  if (!confirm('Clear the conversation and start fresh?')) return;
  messages = [];
  named    = [];
  messagesEl.innerHTML = '';
  notesList.innerHTML  = '<p class="empty-state">Your map will take shape as the conversation unfolds.</p>';
  modeBadge.textContent = 'Collection';
  modeBadge.classList.remove('reading');
  localStorage.removeItem(STORAGE_KEY);
  showOpeningGreeting();
});

// ── Input handling ───────────────────────────────────────────────────────────
userInputEl.addEventListener('input', () => {
  userInputEl.style.height = 'auto';
  userInputEl.style.height = Math.min(userInputEl.scrollHeight, 150) + 'px';
});

userInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!loading) submit();
  }
});

sendBtn.addEventListener('click', () => { if (!loading) submit(); });

function submit() {
  const text = userInputEl.value.trim();
  if (!text) return;
  userInputEl.value = '';
  userInputEl.style.height = 'auto';
  call(text);
}

// ── API call with streaming ───────────────────────────────────────────────────
async function call(userText) {
  if (!userText || loading) return;
  setLoadingState(true);
  userPinnedToBottom = true;

  messages.push({ role: 'user', content: userText });
  renderMessage('user', userText, true);

  const typingEl = addTyping();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    if (!resp.ok) {
      let detail = 'The assistant is temporarily unavailable. Please try again.';
      try {
        const err = await resp.json();
        if (err.error) detail = err.error;
      } catch {}
      throw new Error(detail);
    }

    typingEl.remove();

    const { wrapper, bodyEl } = buildMsgEl('assistant');
    messagesEl.appendChild(wrapper);
    scrollMessagesIfPinned(true);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let sseBuffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
        try {
          const delta = JSON.parse(line.slice(6)).choices?.[0]?.delta?.content || '';
          if (delta) {
            full += delta;
            bodyEl.innerHTML = renderMarkdown(full);
            scrollMessagesIfPinned();
          }
        } catch {}
      }
    }

    sseBuffer += decoder.decode();
    if (sseBuffer.startsWith('data: ') && sseBuffer !== 'data: [DONE]') {
      try {
        const delta = JSON.parse(sseBuffer.slice(6)).choices?.[0]?.delta?.content || '';
        if (delta) full += delta;
      } catch {}
    }

    bodyEl.innerHTML = renderMarkdown(full);
    scrollMessagesIfPinned();

    messages.push({ role: 'assistant', content: full });
    mergeNamedFromText(full);
    detectMode(full);
    saveSession();

  } catch (err) {
    if (typingEl.isConnected) typingEl.remove();
    renderError(err.message);
  }

  setLoadingState(false);
  userInputEl.focus();
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function buildMsgEl(role) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Guide';

  const bodyEl = document.createElement('div');
  bodyEl.className = 'msg-body';

  wrapper.appendChild(label);
  wrapper.appendChild(bodyEl);
  return { wrapper, bodyEl };
}

function renderMessage(role, content, scroll = true) {
  const { wrapper, bodyEl } = buildMsgEl(role);
  if (role === 'assistant') {
    bodyEl.innerHTML = renderMarkdown(content);
  } else {
    bodyEl.textContent = content;
  }
  messagesEl.appendChild(wrapper);
  if (scroll) scrollMessagesIfPinned(true);
}

function addTyping() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  wrapper.id = '__typing__';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Guide';

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  wrapper.appendChild(label);
  wrapper.appendChild(dots);
  messagesEl.appendChild(wrapper);
  scrollMessagesIfPinned(true);
  return wrapper;
}

function renderError(msg) {
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = `<div class="msg-label">System</div><div class="msg-body" style="color:#9b4a4a;font-size:0.88rem;">${escHtml(msg)}</div>`;
  messagesEl.appendChild(el);
  scrollMessagesIfPinned(true);
}

// ── Sidebar: build taste map from assistant responses ───────────────────────
const EXCLUDED_LABELS = new Set([
  'soul reading',
  'suggestions for exploration',
  'suggestions',
  'underlying threads',
  'collection mode',
  'reading & discovery mode',
  'reading and discovery mode',
]);

function normalizeMapTitle(raw) {
  let title = raw.trim()
    .replace(/\*\*/g, '')
    .replace(/"/g, '')
    .replace(/\s*\([^)]*\)\s*$/i, '')
    .replace(/[:;.,!?]+$/g, '')
    .replace(/\s+/g, ' ')
    .trim();

  const directed = title.match(/^(.+?)\s+directed by\s+(.+)$/i);
  if (directed) title = directed[1].trim();

  return title;
}

function isExcludedLabel(title) {
  const key = title.toLowerCase().replace(/[:;.,!?]+$/g, '').trim();
  return !key || key.length < 3 || EXCLUDED_LABELS.has(key);
}

function parseMapItems(text) {
  if (!text || typeof text !== 'string') return [];

  const items = [];
  const lines = text.split('\n');

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;

    const numbered = trimmed.match(
      /^\d+\.\s+(?:\*\*(.+?)\*\*|"(.+?)"(?:\s+by\s+[^"]+)?|([^:(]+?))(?:\s*\([^)]+\))?(?:\s*[:—-]\s*|\s+|$)/
    );
    if (numbered) {
      const raw = numbered[1] || numbered[2] || numbered[3];
      const title = normalizeMapTitle(raw);
      if (!isExcludedLabel(title)) items.push(title);
      continue;
    }

    const numberedTitle = trimmed.match(/^\d+\.\s+\*\*(.+?)\*\*\s*$/);
    if (numberedTitle) {
      const title = normalizeMapTitle(numberedTitle[1]);
      if (!isExcludedLabel(title)) items.push(title);
      continue;
    }

    const boldLine = trimmed.match(/^\*\*(.+?)\*\*(?:\s*\([^)]+\))?(?:\s*[:—-]\s*|\s*$)/);
    if (boldLine) {
      const title = normalizeMapTitle(boldLine[1]);
      if (!isExcludedLabel(title)) items.push(title);
      continue;
    }

    const boldOnly = [...trimmed.matchAll(/\*\*([^*]+)\*\*/g)].map(m => m[1].trim());
    for (const raw of boldOnly) {
      const title = normalizeMapTitle(raw);
      if (!isExcludedLabel(title)) items.push(title);
    }
  }

  return items;
}

function mergeNamedFromText(text) {
  const incoming = parseMapItems(text);
  if (incoming.length === 0) return;

  let changed = false;
  for (const title of incoming) {
    const exists = named.some(n => n.toLowerCase() === title.toLowerCase());
    if (!exists) {
      named.push(title);
      changed = true;
    }
  }

  if (changed) renderNamed();
}

function renderNamed() {
  if (named.length === 0) {
    notesList.innerHTML = '<p class="empty-state">Your map will take shape as the conversation unfolds.</p>';
    return;
  }

  const visible = named.slice(-40);
  const offset = named.length - visible.length;
  notesList.innerHTML = visible.map((title, index) =>
    `<div class="note-entry"><div class="note-index">${offset + index + 1}</div><div class="note-title">${escHtml(title)}</div></div>`
  ).join('');
}

function rebuildNamedFromMessages() {
  named = [];
  for (const message of messages) {
    if (!message || message.role !== 'assistant') continue;
    mergeNamedFromText(message.content);
  }
  renderNamed();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Mode detection ────────────────────────────────────────────────────────────
function detectMode(text = '') {
  const t = (text || '').toLowerCase();
  if (t.includes('soul reading') || t.includes('underlying thread') ||
      t.includes('what draws you across') || t.includes('what i see')) {
    modeBadge.textContent = 'Reading';
    modeBadge.classList.add('reading');
  }
}

// ── Startup ──────────────────────────────────────────────────────────────────
(function init() {
  try {
    const saved = tryLoadSession();
    if (saved && Array.isArray(saved.messages) && saved.messages.length > 0) {
      messages = saved.messages;
      saved.messages.forEach(m => {
        if (m && m.role !== 'system' && m.content) renderMessage(m.role, m.content, false);
      });
      rebuildNamedFromMessages();
      const lastAssistant = [...messages].reverse().find(m => m && m.role === 'assistant');
      detectMode(lastAssistant?.content || '');
    } else {
      showOpeningGreeting();
    }
  } catch {
    messages = [];
    named = [];
    messagesEl.innerHTML = '';
    showOpeningGreeting();
  }

  userInputEl.focus();
})();
</script>
